server {
    listen 8080;
    server_name localhost;

    # Root directory for static assets
    root /usr/share/nginx/html;
    index index.html;

    # Support for React Router (History API)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Enable Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Cache control for static assets (Vite hashes filenames)
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Health check endpoint (optional but good for Cloud Run)
    location /healthz {
        access_log off;
        return 200 "OK";
    }
}
